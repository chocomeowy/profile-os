name: Weekly OS Check-in

on:
  schedule:
    # Every Sunday at 8:00 AM SGT (00:00 UTC)
    - cron: "0 0 * * 0"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI for testing

jobs:
  weekly-checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Weekly OS check-in
        env:
          GDRIVE_FILE_ID:              ${{ secrets.GDRIVE_FILE_ID }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_GOALS_LOG_FILE_ID:    ${{ secrets.GDRIVE_GOALS_LOG_FILE_ID }}
          GEMINI_API_KEY:              ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:            ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_ADDRESS:               ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD:              ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:             ${{ secrets.EMAIL_RECIPIENT }}
        run: python weekly_checkin.py
